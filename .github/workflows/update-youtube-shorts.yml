name: Update YouTube Shorts

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-shorts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install YouTube feed reader
        run: python -m pip install --disable-pip-version-check yt-dlp

      - name: Refresh Shorts feed
        run: |
          yt-dlp --flat-playlist --dump-single-json "https://www.youtube.com/@mindofAR/shorts" > shorts-flat.json

          if curl --fail --silent --show-error --retry 3 --retry-all-errors "https://www.youtube.com/feeds/videos.xml?channel_id=UCPMXthMLXNxMxVSy_xXeEGg" > youtube-rss.xml \
            && python scripts/parse-youtube-rss.py youtube-rss.xml shorts-detailed.json; then
            echo "Loaded recent descriptions from YouTube RSS."
          else
            echo "Description metadata was unavailable; preserving existing descriptions."
            echo '{"entries":[]}' > shorts-detailed.json
          fi

          node scripts/update-shorts.mjs shorts-flat.json shorts-detailed.json

      - name: Commit feed changes
        run: |
          if git diff --quiet shorts.json shorts-data.js; then
            echo "No new Shorts found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shorts.json shorts-data.js
          git commit -m "Update YouTube Shorts feed"
          git push
